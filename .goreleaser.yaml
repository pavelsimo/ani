version: 2

project_name: ani

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/pavelsimo/ani/cmd.Version={{.Version}}
    main: .

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: ani
    repository:
      owner: pavelsimo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/pavelsimo/ani
    description: Browse and search AniList anime from your terminal.
    license: MIT
    install: |
      bin.install "ani"
    test: |
      system "#{bin}/ani", "version"

release:
  github:
    owner: pavelsimo
    name: ani
  draft: false
  prerelease: auto
